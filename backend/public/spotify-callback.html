<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SoundSwipe - Connected</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    h2 { color: #4ade80; margin-bottom: 10px; }
    p { color: rgba(255,255,255,0.6); margin-bottom: 20px; }
    .info {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      text-align: left;
    }
    .info p {
      margin: 8px 0;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      word-break: break-all;
    }
    .info strong { color: #ff6b6b; }
    .btn {
      background: #ff6b6b;
      color: #fff;
      border: none;
      padding: 15px 40px;
      font-size: 16px;
      border-radius: 30px;
      cursor: pointer;
    }
    .full-url {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 8px;
      font-size: 11px;
      word-break: break-all;
      margin-top: 10px;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>✓ Connected!</h2>
    <p>Close this window and return to the app.</p>
    <div class="info" id="info">
      <p>Loading...</p>
    </div>
    <button class="btn" onclick="window.close()">Close Window</button>
    <div class="full-url" id="urlDebug"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const userId = params.get('userId');
    const username = params.get('username');
    const error = params.get('error');
    
    document.getElementById('urlDebug').textContent = 'URL: ' + window.location.href;
    
    const info = document.getElementById('info');
    
    if (token && userId) {
      localStorage.setItem('ss_spotify_token', token);
      localStorage.setItem('ss_spotify_user', JSON.stringify({ id: userId, username: username || '' }));
      
      info.innerHTML = `
        <p><strong>Success!</strong></p>
        <p>Username: ${username || 'Unknown'}</p>
        <p>Token: ${token.substring(0, 30)}...</p>
      `;
    } else if (error) {
      info.innerHTML = `<p><strong>Error:</strong> ${error}</p>`;
    } else {
      info.innerHTML = `<p><strong>No token found in URL</strong></p>`;
    }
  </script>
</body>
</html>
